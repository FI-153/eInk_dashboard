stages:
  - quality
  - test
  - image

# Only run on pushes to develop and on merge requests targeting develop.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Shared setup for the Python jobs. python:3.9 (matches the app runtime) ships make.
.python:
  image: python:3.9
  before_script:
    - pip install --no-cache-dir -r requirements-dev.txt

quality:
  extends: .python
  stage: quality
  script:
    - make lint

test:
  extends: .python
  stage: test
  script:
    - make test

build-image:
  stage: image
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t kobo_dash:$CI_COMMIT_SHORT_SHA .
